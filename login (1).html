<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radio Lonestar - Přihlášení</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0a174e 0%, #ffd600 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .auth-container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 32px rgba(10, 23, 78, 0.3);
            width: 100%;
            max-width: 400px;
            padding: 40px;
        }
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        .logo h1 {
            color: #0a174e;
            font-size: 2em;
            margin-bottom: 5px;
        }
        .logo p {
            color: #ffd600;
            font-weight: bold;
        }
        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            border-bottom: 2px solid #f0f0f0;
        }
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            color: #0a174e;
            font-weight: bold;
            font-size: 1em;
            border-bottom: 3px solid transparent;
            transition: all 0.3s;
        }
        .tab-btn.active {
            color: #ffd600;
            border-bottom-color: #ffd600;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #0a174e;
            font-weight: bold;
        }
        input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 6px;
            font-size: 1em;
            transition: border 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #ffd600;
        }
        .submit-btn {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #0a174e, #ffd600);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: bold;
            font-size: 1em;
            cursor: pointer;
            transition: transform 0.2s;
        }
        .submit-btn:hover {
            transform: translateY(-2px);
        }
        .form-section {
            display: none;
        }
        .form-section.active {
            display: block;
        }
        .error {
            color: #d32f2f;
            font-size: 0.9em;
            margin-top: 5px;
        }
        .success {
            color: #388e3c;
            font-size: 0.9em;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="logo">
            <h1>LONESTAR</h1>
            <p>Radio</p>
        </div>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('login')">Přihlášení</button>
            <button class="tab-btn" onclick="switchTab('register')">Registrace</button>
        </div>

        <!-- LOGIN FORM -->
        <form id="loginForm" class="form-section active" onsubmit="handleLogin(event)">
            <div class="form-group">
                <label for="loginEmail">Email nebo Tel. číslo</label>
                <input type="text" id="loginEmail" required>
            </div>
            <div class="form-group">
                <label for="loginPassword">Heslo</label>
                <input type="password" id="loginPassword" required>
            </div>
            <button type="submit" class="submit-btn">Přihlásit se</button>
            <div id="loginError" class="error"></div>
            <button type="button" class="submit-btn" style="background: #999; margin-top: 10px;" onclick="skipLogin()">Pokračovat bez přihlášení</button>
        </form>

        <!-- REGISTER FORM -->
        <form id="registerForm" class="form-section" onsubmit="handleRegister(event)">
            <div class="form-group">
                <label for="regEmail">Email nebo Tel. číslo</label>
                <input type="text" id="regEmail" required>
            </div>
            <div class="form-group">
                <label for="regPassword">Heslo</label>
                <input type="password" id="regPassword" required>
            </div>
            <div class="form-group">
                <label for="regPasswordRepeat">Opakovat heslo</label>
                <input type="password" id="regPasswordRepeat" required>
            </div>
            <button type="submit" class="submit-btn">Zaregistrovat se</button>
            <div id="registerError" class="error"></div>
            <div id="registerSuccess" class="success"></div>
        </form>
    </div>

    <script>
        function switchTab(tab) {
            document.querySelectorAll('.form-section').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            
            if(tab === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('registerForm').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }

        function handleLogin(e) {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const password = document.getElementById('loginPassword').value;
            
            // Jednoduchá validace (v produkci by byla komunikace se serverem)
            const users = JSON.parse(localStorage.getItem('lonestarUsers')) || [];
            const user = users.find(u => (u.email === email || u.phone === email) && u.password === password);
            
            if(user) {
                localStorage.setItem('currentUser', JSON.stringify(user));
                // Check if user is admin
                const adminEmails = ['Djjzolik@gmail.com', 'DJKubyX@gmail.com', 'DJJardis@gmail.com', 'MichalatLonestar@gmail.com', 'venca.honzik@gmail.com'];
                const isAdmin = adminEmails.includes(user.email) ? 'true' : 'false';
                localStorage.setItem('isAdmin', isAdmin);
                window.location.href = 'index.html';
            } else {
                document.getElementById('loginError').textContent = 'Nesprávné přihlašovací údaje!';
            }
        }

        function handleRegister(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const passwordRepeat = document.getElementById('regPasswordRepeat').value;
            
            if(password !== passwordRepeat) {
                document.getElementById('registerError').textContent = 'Hesla se neshodují!';
                return;
            }

            let users = JSON.parse(localStorage.getItem('lonestarUsers')) || [];
            if(users.find(u => u.email === email || u.phone === email)) {
                document.getElementById('registerError').textContent = 'Uživatel již existuje!';
                return;
            }

            const newUser = {
                id: Date.now(),
                email: email,
                phone: email,
                password: password,
                bodů: 0,
                created: new Date()
            };

            users.push(newUser);
            localStorage.setItem('lonestarUsers', JSON.stringify(users));
            
            // Check if new user is admin
            const adminEmails = ['Djjzolik@gmail.com', 'DJKubyX@gmail.com', 'DJJardis@gmail.com', 'MichalatLonestar@gmail.com', 'venca.honzik@gmail.com'];
            if (adminEmails.includes(email)) {
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('currentUser', JSON.stringify(newUser));
                window.location.href = 'index.html';
            } else {
                document.getElementById('registerError').textContent = '';
                document.getElementById('registerSuccess').textContent = 'Registrace úspěšná! Nyní se přihlaste.';
                setTimeout(() => switchTab('login'), 2000);
            }
        }

        function skipLogin() {
            localStorage.removeItem('currentUser');
            window.location.href = 'index.html';
        }
    </script>
</body>
</html>
